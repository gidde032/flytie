name: release

# Publishes flytie to PyPI when a version tag (v*) is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored in the repo.

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install native PDF dependencies
        # WeasyPrint loads native Pango/Cairo via ctypes; without them
        # the PDF tests would skip. Install on the runner so the release
        # pipeline genuinely exercises the PDF path before publishing.
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0
      - name: Install
        # All extras so the pdf and ai paths are exercised. A release
        # that silently broke `flytie export` or `flytie suggest` because
        # the test job didn't install their deps would be exactly the
        # kind of post-PyPI surprise the v0.1.1 release-test reviewer
        # flagged. v0.1.2: bullet 2.2.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,pdf,ai]"
      - name: Lint
        # Both checks, same as ci.yml. Running `ruff check` without
        # `ruff format --check` would let the release pipeline publish a
        # codebase that passed lint but had unformatted hunks; v0.1.2
        # closed that gap.
        run: |
          ruff format --check src tests
          ruff check src tests
      - name: Type check
        run: mypy src
      - name: Test
        # `--cov` triggers pytest-cov, which reads `fail_under = 85` from
        # `[tool.coverage.report]` in pyproject.toml. Without `--cov` the
        # coverage gate is silently skipped on the release path — exactly
        # the kind of "the gate runs on PRs but not on releases" drift
        # the v0.1.2 dual-lens audit caught.
        run: pytest --cov=src/flytie --cov-report=term-missing

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        # Fail-fast if someone pushes (or mis-tags) a tag that doesn't match
        # the version baked into the package. Without this check, a typo
        # like `v0.1.1` pushed against a 0.2.0 codebase silently uploads a
        # mismatched release to PyPI — which can't be replaced, only yanked.
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="v$(grep -oP '__version__\s*=\s*"\K[^"]+' src/flytie/__init__.py)"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Pushed tag '$TAG' does not match package version '$VERSION'."
            echo "Bump src/flytie/__init__.py to match the tag (or vice versa)." >&2
            exit 1
          fi
          echo "Tag $TAG matches package version $VERSION."
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # The `pypi` environment is where the Trusted Publisher is configured
    # on PyPI; `id-token: write` lets the job mint an OIDC token.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

# Development-only alembic config. Production migrations are bundled inside
# the package at `src/flytie/migrations/` and invoked programmatically via
# `flytie.db.upgrade_to_head()`. This file is kept so contributors can run
# `alembic revision --autogenerate -m "..."` during development.
[alembic]
script_location = src/flytie/migrations
prepend_sys_path = .
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
